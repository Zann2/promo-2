<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Film</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .poster-container {
            text-align: center;
            max-width: 400px;
        }

        .poster-container img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1 {
            margin-top: 15px;
            font-size: 24px;
        }

        p {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.8;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: crimson;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <img src="poster kopi.png" alt="Selamat Datang!">
        <h1>Selamat Datang!</h1>
         <p>Dapatkan French Vanila Latte hanya Rp.25.000,00</p>
        <p>Gratis 1 Croissant gurih setiap 2 cup pembelian</p>
        <p>Tunggu apalagi segera order!</p>

        <!-- GANTI LINK DI BAWAH INI DENGAN LINK IG KAMU -->
        <a href="https://instagram.com/username_kamu" target="_blank" class="btn">
            Pesan Sekarang
        </a>
    </div>

</body>
</html>
